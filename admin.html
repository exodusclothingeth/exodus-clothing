<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000000; color: #ffffff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #222; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; }
        .logout-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; }
        .stat-label { color: #888; margin-top: 8px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: white; }
        button { background: #1a1a1a; border: 1px solid #333; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; }
        .orders-table { width: 100%; border-collapse: collapse; background: #111; border-radius: 16px; overflow: hidden; }
        .orders-table th, .orders-table td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .orders-table th { background: #0a0a0a; color: #888; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .status-pending { background: rgba(255,255,255,0.1); border: 1px solid #333; }
        .status-out_for_delivery { background: rgba(255,255,255,0.15); border: 1px solid #fff; }
        .status-delivered { background: rgba(0,200,83,0.2); border: 1px solid #00c853; color: #00c853; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        @media (max-width: 768px) { .orders-table { font-size: 0.7rem; } .orders-table th, .orders-table td { padding: 8px; } }
    </style>
</head>
<body>

<script>
    // CHECK IF LOGGED IN
    const isLoggedIn = sessionStorage.getItem('admin_logged_in');
    if (!isLoggedIn) {
        window.location.href = 'login.html';
    }
    
    function logout() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }
</script>

<div class="container">
    <div class="header">
        <div class="logo"><h1>EXODUS</h1><p style="color:#888; font-size:0.7rem;">ADMIN DASHBOARD</p></div>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Revenue (ETB)</div></div>
        <div class="stat-card"><div class="stat-number" id="pendingOrders">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><div class="stat-number" id="deliveredOrders">0</div><div class="stat-label">Delivered</div></div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, phone, order ID...">
        <button onclick="loadOrders()">Refresh</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="orders-table">
            <thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Phone</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="ordersBody"><tr><td colspan="8" style="text-align:center;">Loading orders...</td></tr></tbody>
        </table>
    </div>
</div>

<div class="toast" id="toastMsg">Updated</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let allOrders = [];

    async function loadOrders() {
        try {
            const res = await fetch(`${API_BASE}/orders`);
            allOrders = await res.json();
            updateStats();
            renderTable();
        } catch(err) {
            document.getElementById('ordersBody').innerHTML = '<tr><td colspan="8" style="text-align:center;">Error loading orders</td></tr>';
        }
    }

    function updateStats() {
        const total = allOrders.length;
        const revenue = allOrders.reduce((s, o) => s + (o.total || 0), 0);
        const pending = allOrders.filter(o => o.delivery_status === 'pending').length;
        const delivered = allOrders.filter(o => o.delivery_status === 'delivered').length;
        document.getElementById('totalOrders').innerText = total;
        document.getElementById('totalRevenue').innerText = revenue.toLocaleString();
        document.getElementById('pendingOrders').innerText = pending;
        document.getElementById('deliveredOrders').innerText = delivered;
    }

    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allOrders.filter(o => 
            o.order_id?.toLowerCase().includes(search) ||
            o.customer_name?.toLowerCase().includes(search) ||
            o.customer_phone?.includes(search)
        );
        
        if (filtered.length === 0) {
            document.getElementById('ordersBody').innerHTML = '<tr><td colspan="8" style="text-align:center;">No orders found</td></tr>';
            return;
        }
        
        document.getElementById('ordersBody').innerHTML = filtered.map(order => `
            <tr>
                <td><strong>${order.order_id}</strong></td>
                <td>${new Date(order.created_at).toLocaleDateString()}</td>
                <td>${order.customer_name}</td>
                <td>${order.customer_phone}</td>
                <td>${order.items?.length || 0} items</td>
                <td><strong>${(order.total || 0).toLocaleString()} ETB</strong></td>
                <td><span class="status status-${order.delivery_status || 'pending'}">${order.delivery_status || 'pending'}</span></td>
                <td>
                    <button onclick="updateStatus('${order.order_id}', 'out_for_delivery')">📦 Send</button>
                    <button onclick="updateStatus('${order.order_id}', 'delivered')">✅ Deliver</button>
                </td>
            </tr>
        `).join('');
    }

    async function updateStatus(orderId, status) {
        await fetch(`${API_BASE}/orders/${orderId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ delivery_status: status })
        });
        showToast(`Order ${orderId} updated to ${status}`);
        loadOrders();
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    document.getElementById('searchInput').addEventListener('input', renderTable);
    loadOrders();
</script>
</body>
</html>
