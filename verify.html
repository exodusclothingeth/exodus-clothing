<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXODUS - Email Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #111; border: 1px solid #222; border-radius: 32px; padding: 40px; width: 100%; max-width: 400px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo img { height: 70px; width: auto; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 32px; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 16px; color: white; margin-bottom: 16px; font-size: 1rem; }
        button { width: 100%; background: white; color: black; padding: 14px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        button:hover { background: #ddd; }
        .message { padding: 12px; border-radius: 12px; text-align: center; margin-top: 16px; font-size: 0.85rem; display: none; }
        .success { background: rgba(0,200,83,0.2); color: #00c853; }
        .error { background: rgba(255,68,68,0.2); color: #ff4444; }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="images/exodus-logo.png" alt="EXODUS"></div>
        <h1>Admin Access</h1>
        <p class="subtitle">Email verification required</p>
        
        <div id="step1">
            <input type="email" id="email" placeholder="Email" value="exodusclothingeth@gmail.com">
            <button id="sendBtn">Send Verification Code</button>
        </div>
        
        <div id="step2" style="display:none;">
            <input type="text" id="code" placeholder="Enter 6-digit code" maxlength="6">
            <button id="verifyBtn">Verify & Login</button>
            <button id="resendBtn" style="background:#1a1a1a; color:#888;">Resend Code</button>
        </div>
        
        <div id="message" class="message"></div>
        <div class="back-link"><a href="index.html">← Back to Store</a></div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        document.getElementById('sendBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('sendBtn');
            const msgDiv = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerHTML = 'Sending...';
            
            try {
                const res = await fetch(`${API_BASE}/send-verification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    msgDiv.className = 'message success';
                    if (data.code) {
                        msgDiv.innerHTML = 'TEST MODE - Use code: ' + data.code;
                    } else {
                        msgDiv.innerHTML = 'Code sent to your email!';
                    }
                    msgDiv.style.display = 'block';
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.innerHTML = data.error;
                    msgDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Send Verification Code';
                }
            } catch(err) {
                msgDiv.className = 'message error';
                msgDiv.innerHTML = 'Connection error';
                msgDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Send Verification Code';
            }
        };
        
        document.getElementById('verifyBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const btn = document.getElementById('verifyBtn');
            const msgDiv = document.getElementById('message');
            
            btn.disabled = true;
            btn.innerHTML = 'Verifying...';
            
            try {
                const res = await fetch(`${API_BASE}/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await res.json();
                
                if (data.success) {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_login_time', Date.now());
                    window.location.href = 'admin.html';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.innerHTML = data.error;
                    msgDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'Verify & Login';
                }
            } catch(err) {
                msgDiv.className = 'message error';
                msgDiv.innerHTML = 'Connection error';
                msgDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Verify & Login';
            }
        };
        
        document.getElementById('resendBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');
            
            try {
                const res = await fetch(`${API_BASE}/send-verification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    msgDiv.className = 'message success';
                    msgDiv.innerHTML = data.code ? 'New code: ' + data.code : 'New code sent!';
                    msgDiv.style.display = 'block';
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.innerHTML = 'Failed to resend';
                    msgDiv.style.display = 'block';
                }
            } catch(err) {
                msgDiv.className = 'message error';
                msgDiv.innerHTML = 'Error';
                msgDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
