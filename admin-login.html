<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Order Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000000; color: #ffffff; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header & Navigation */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; }
        .logo p { color: #888; font-size: 0.7rem; letter-spacing: 2px; }
        .nav-tabs { display: flex; gap: 5px; background: #111; padding: 5px; border-radius: 50px; border: 1px solid #222; }
        .nav-tab { padding: 10px 24px; border-radius: 40px; text-decoration: none; color: #aaa; font-weight: 500; transition: 0.2s; }
        .nav-tab.active { background: #fff; color: #000; }
        .nav-tab:hover:not(.active) { background: #1a1a1a; color: #fff; }
        .logout-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; }
        .logout-btn:hover { background: #ff4444; border-color: #ff4444; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; }
        .stat-label { color: #888; font-size: 0.8rem; margin-top: 5px; }
        
        /* Stock Chart */
        .chart-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .chart-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
        .stock-bars { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; }
        .stock-item { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .stock-name { width: 120px; font-size: 0.8rem; font-weight: 500; }
        .stock-bar-container { flex: 1; background: #1a1a1a; border-radius: 20px; height: 30px; overflow: hidden; }
        .stock-bar { height: 100%; background: linear-gradient(90deg, #fff, #aaa); border-radius: 20px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; color: #000; font-size: 0.7rem; font-weight: bold; }
        .stock-bar.low { background: linear-gradient(90deg, #ffaa00, #ff8800); }
        .stock-bar.critical { background: linear-gradient(90deg, #ff4444, #cc0000); }
        .stock-value { width: 60px; text-align: right; font-size: 0.8rem; }
        
        /* Alerts */
        .alert-box { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 20px; display: none; }
        .alert-out { background: #ff444433; border-left: 4px solid #ff4444; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        .alert-low { background: #ffaa0044; border-left: 4px solid #ffaa00; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        
        /* Orders List */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 40px; color: white; }
        .refresh-btn { background: #fff; color: #000; border: none; padding: 0 20px; border-radius: 40px; cursor: pointer; }
        .orders-list { display: flex; flex-direction: column; gap: 16px; max-height: 600px; overflow-y: auto; }
        .order-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 16px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #222; }
        .order-id { font-weight: 700; }
        .order-date { color: #666; font-size: 0.7rem; }
        .customer-name { font-weight: 600; margin-bottom: 4px; }
        .customer-phone { color: #aaa; font-size: 0.8rem; }
        .order-details { display: flex; justify-content: space-between; padding: 12px 0; margin: 12px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .order-total { font-weight: 700; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; margin-bottom: 12px; }
        .status-pending { background: rgba(255,255,255,0.1); border: 1px solid #333; }
        .status-out_for_delivery { background: rgba(255,255,255,0.15); border: 1px solid #fff; }
        .status-delivered { background: rgba(0,200,83,0.2); border: 1px solid #00c853; color: #00c853; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
        .action-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 40px; color: white; cursor: pointer; font-size: 0.75rem; text-align: center; }
        .status-select { background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 40px; padding: 10px; width: 100%; margin-top: 8px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
        .modal-content { background: #111; border: 1px solid #222; border-radius: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .close-modal { font-size: 28px; cursor: pointer; background: none; border: none; color: #fff; }
        .proof-photo { width: 100%; border-radius: 16px; margin-top: 16px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1100; font-size: 0.8rem; white-space: nowrap; }
        .loading { text-align: center; padding: 40px; color: #888; }
        
        @media (max-width: 768px) { .container { padding: 16px; } .stats-grid { gap: 12px; } .stock-name { width: 80px; } }
    </style>
</head>
<body>

<script>
    // LOGIN CHECK
    const isLoggedIn = sessionStorage.getItem('admin_logged_in');
    if (!isLoggedIn) {
        window.location.href = 'verify.html';
    }
    
    function logout() {
        sessionStorage.clear();
        window.location.href = 'verify.html';
    }
</script>

<div class="container">
    <div class="admin-header">
        <div class="logo">
            <h1>EXODUS</h1>
            <p>ADMIN PANEL</p>
        </div>
        <div class="nav-tabs">
            <a href="admin.html" class="nav-tab active">📦 Orders</a>
            <a href="product-manager.html" class="nav-tab">👕 Products</a>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Revenue (ETB)</div></div>
        <div class="stat-card"><div class="stat-number" id="outForDelivery">0</div><div class="stat-label">Out for Delivery</div></div>
        <div class="stat-card"><div class="stat-number" id="deliveredCount">0</div><div class="stat-label">Delivered</div></div>
    </div>

    <!-- Stock Chart -->
    <div class="chart-card" id="stockChartCard" style="display:none;">
        <div class="chart-title"><i class="fas fa-chart-simple"></i> Stock Levels</div>
        <div id="stockBars" class="stock-bars"><div class="loading">Loading stock data...</div></div>
    </div>

    <!-- Alerts -->
    <div id="stockAlerts" class="alert-box"></div>

    <!-- Orders -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name, phone, or order ID...">
        <button class="refresh-btn" onclick="loadAllData()"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div id="ordersContainer" class="orders-list"><div class="loading">Loading orders...</div></div>
</div>

<!-- Modals -->
<div class="modal" id="orderModal"><div class="modal-content"><div class="modal-header"><h2>Order Details</h2><button class="close-modal" id="closeModalBtn">&times;</button></div><div id="orderDetailContent"></div></div></div>
<div class="modal" id="photoModal"><div class="modal-content"><div class="modal-header"><h2>Delivery Proof</h2><button class="close-modal" id="closePhotoModalBtn">&times;</button></div><div id="photoContent"></div></div></div>
<div class="toast" id="toastMsg">Updated!</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let allOrders = [], allProducts = [];

    async function loadAllData() { await Promise.all([loadOrders(), loadProducts()]); }
    
    async function loadOrders() {
        try { const res = await fetch(`${API_BASE}/orders`); allOrders = await res.json(); updateStats(); renderOrders(); } 
        catch(e) { document.getElementById('ordersContainer').innerHTML = '<div class="loading">Error loading orders</div>'; }
    }
    
    async function loadProducts() {
        try { const res = await fetch(`${API_BASE}/products`); allProducts = await res.json(); renderStockChart(); checkStockAlerts(); } 
        catch(e) { console.log('Product load error'); }
    }
    
    function renderStockChart() {
        const chartCard = document.getElementById('stockChartCard');
        if (!allProducts.length) { chartCard.style.display = 'none'; return; }
        chartCard.style.display = 'block';
        const productsWithStock = allProducts.map(p => ({ ...p, totalStock: Object.values(p.stock).reduce((a,b)=>a+b,0) })).sort((a,b)=>a.totalStock-b.totalStock);
        const maxStock = Math.max(...productsWithStock.map(p=>p.totalStock),1);
        document.getElementById('stockBars').innerHTML = productsWithStock.map(p => {
            let barClass = '', icon = '';
            if (p.totalStock === 0) { barClass = 'critical'; icon = '🔴'; }
            else if (p.totalStock <= 3) { barClass = 'low'; icon = '🟡'; }
            else icon = '⚪';
            return `<div class="stock-item"><div class="stock-name">${icon} ${p.name.length>20?p.name.substring(0,20)+'...':p.name}</div><div class="stock-bar-container"><div class="stock-bar ${barClass}" style="width:${(p.totalStock/maxStock)*100}%">${(p.totalStock/maxStock)*100 > 15 ? p.totalStock : ''}</div></div><div class="stock-value">${p.totalStock} left</div></div>`;
        }).join('');
    }
    
    function checkStockAlerts() {
        const out = allProducts.filter(p=>Object.values(p.stock).every(q=>q===0));
        const low = allProducts.filter(p=>Object.values(p.stock).some(q=>q<=3&&q>0));
        const alertDiv = document.getElementById('stockAlerts');
        if(out.length||low.length) {
            alertDiv.style.display='block';
            alertDiv.innerHTML = (out.length?`<div class="alert-out"><strong>⚠️ OUT OF STOCK:</strong> ${out.map(p=>p.name).join(', ')}</div>`:'') + (low.length?`<div class="alert-low"><strong>📦 LOW STOCK (≤3 left):</strong> ${low.map(p=>p.name).join(', ')}</div>`:'');
        } else alertDiv.style.display='none';
    }
    
    function updateStats() {
        document.getElementById('totalOrders').innerText = allOrders.length;
        document.getElementById('totalRevenue').innerText = allOrders.reduce((s,o)=>s+(o.total||0),0).toLocaleString();
        document.getElementById('outForDelivery').innerText = allOrders.filter(o=>o.delivery_status==='out_for_delivery').length;
        document.getElementById('deliveredCount').innerText = allOrders.filter(o=>o.delivery_status==='delivered').length;
    }
    
    function renderOrders() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allOrders.filter(o=>o.order_id?.toLowerCase().includes(term)||o.customer_name?.toLowerCase().includes(term)||o.customer_phone?.includes(term));
        const container = document.getElementById('ordersContainer');
        if(!filtered.length) { container.innerHTML = '<div class="loading">No orders found</div>'; return; }
        container.innerHTML = filtered.map(order => {
            let statusClass = 'status-pending', statusText = 'Pending';
            if(order.delivery_status==='out_for_delivery'){ statusClass='status-out_for_delivery'; statusText='Out for Delivery'; }
            if(order.delivery_status==='delivered'){ statusClass='status-delivered'; statusText='Delivered'; }
            return `<div class="order-card"><div class="order-header"><span class="order-id">${order.order_id}</span><span class="order-date">${new Date(order.created_at).toLocaleDateString()}</span></div><div class="customer-name">${order.customer_name}</div><div class="customer-phone"><i class="fas fa-phone-alt"></i> ${order.customer_phone}</div><div class="order-details"><span>📦 ${order.items?.length||0} items</span><span class="order-total">${(order.total||0).toLocaleString()} ETB</span></div><div class="status-badge ${statusClass}">${statusText}</div><div class="action-buttons"><button class="action-btn" onclick="viewOrder('${order.order_id}')"><i class="fas fa-eye"></i> View</button>${!order.delivery_photo?`<button class="action-btn" onclick="uploadPhoto('${order.order_id}')"><i class="fas fa-camera"></i> Add Photo</button>`:`<button class="action-btn" onclick="viewPhoto('${order.delivery_photo}')"><i class="fas fa-image"></i> View Photo</button>`}</div><select class="status-select" onchange="updateStatus('${order.order_id}', this.value)"><option value="pending" ${order.delivery_status==='pending'?'selected':''}>Pending</option><option value="out_for_delivery" ${order.delivery_status==='out_for_delivery'?'selected':''}>Out for Delivery</option><option value="delivered" ${order.delivery_status==='delivered'?'selected':''}>Delivered</option></select></div>`;
        }).join('');
    }
    
    async function updateStatus(id,status) { await fetch(`${API_BASE}/orders/${id}/status`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({delivery_status:status})}); showToast(`Order ${id} updated`); loadAllData(); }
    async function uploadPhoto(id) { let input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ let fd=new FormData(); fd.append('photo',e.target.files[0]); showToast('Uploading...'); let res=await fetch(`${API_BASE}/upload-delivery-photo/${id}`,{method:'POST',body:fd}); if(res.ok) showToast('Photo uploaded!'); loadAllData(); }; input.click(); }
    function viewOrder(id) { let order=allOrders.find(o=>o.order_id===id); if(!order) return; document.getElementById('orderDetailContent').innerHTML = `<div><strong>Order ID:</strong> ${order.order_id}</div><div><strong>Date:</strong> ${new Date(order.created_at).toLocaleString()}</div><div><strong>Customer:</strong> ${order.customer_name}</div><div><strong>Email:</strong> ${order.customer_email}</div><div><strong>Phone:</strong> ${order.customer_phone}</div><div><strong>Address:</strong> ${order.customer_address}</div><div><strong>Total:</strong> ${order.total.toLocaleString()} ETB</div><div><strong>Items:</strong> ${(order.items||[]).map(i=>`<div>${i.name} (${i.size}) x${i.quantity} = ${(i.price*i.quantity).toLocaleString()} ETB</div>`).join('')}</div>${order.delivery_photo?`<img src="${order.delivery_photo}" class="proof-photo">`:'<p>No delivery photo</p>'}`; document.getElementById('orderModal').style.display='flex'; }
    function viewPhoto(url) { document.getElementById('photoContent').innerHTML = `<img src="${url}" class="proof-photo"><p>Delivery proof</p>`; document.getElementById('photoModal').style.display='flex'; }
    function showToast(msg) { let t=document.getElementById('toastMsg'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500); }
    document.getElementById('searchInput').addEventListener('input',()=>renderOrders());
    document.getElementById('closeModalBtn').onclick=()=>document.getElementById('orderModal').style.display='none';
    document.getElementById('closePhotoModalBtn').onclick=()=>document.getElementById('photoModal').style.display='none';
    window.onclick = e => { if(e.target===document.getElementById('orderModal')) document.getElementById('orderModal').style.display='none'; if(e.target===document.getElementById('photoModal')) document.getElementById('photoModal').style.display='none'; };
    window.viewOrder=viewOrder; window.viewPhoto=viewPhoto; window.updateStatus=updateStatus; window.uploadPhoto=uploadPhoto;
    loadAllData();
</script>
</body>
</html>
