<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Product Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000000; color: #ffffff; padding: 40px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 32px; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; }
        .logo p { color: #888; font-size: 0.7rem; letter-spacing: 2px; }
        .nav-tabs { display: flex; gap: 5px; background: #111; padding: 5px; border-radius: 50px; border: 1px solid #222; }
        .nav-tab { padding: 10px 24px; border-radius: 40px; text-decoration: none; color: #aaa; font-weight: 500; }
        .nav-tab.active { background: #fff; color: #000; }
        .logout-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        
        .two-columns { display: grid; grid-template-columns: 1fr 2fr; gap: 32px; }
        .form-card, .products-card, .hero-card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 28px; }
        .form-card h2, .products-card h2, .hero-card h2 { margin-bottom: 20px; font-size: 1.4rem; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; font-family: inherit; }
        input:focus { outline: none; border-color: #666; }
        
        .sizes-container { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
        .size-checkbox { background: #1a1a1a; padding: 8px 16px; border-radius: 40px; cursor: pointer; border: 1px solid #333; }
        .size-checkbox.selected { background: white; color: black; border-color: white; }
        
        .stock-inputs { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 12px; }
        .stock-item { background: #1a1a1a; padding: 8px; border-radius: 12px; }
        .stock-item label { font-size: 0.7rem; margin-bottom: 4px; }
        .stock-item input { padding: 6px; font-size: 0.9rem; }
        
        .image-inputs { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .image-row { display: flex; gap: 10px; align-items: center; }
        .image-row input { flex: 1; }
        .image-preview { width: 60px; height: 60px; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        button { background: white; color: black; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ddd; }
        .btn-secondary { background: #222; color: white; }
        .btn-secondary:hover { background: #333; }
        
        .products-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { color: #888; font-weight: 500; }
        .product-image { width: 50px; height: 60px; object-fit: cover; border-radius: 8px; }
        .edit-btn, .delete-btn { padding: 6px 12px; margin: 0 4px; font-size: 0.8rem; cursor: pointer; border-radius: 8px; }
        .edit-btn { background: #333; color: white; border: none; }
        .delete-btn { background: #ff444433; color: #ff4444; border: none; }
        
        .alert-box { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 20px; display: none; }
        .alert-out { background: #ff444433; border-left: 4px solid #ff4444; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        .alert-low { background: #ffaa0044; border-left: 4px solid #ffaa00; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        
        .hero-preview img { max-width: 100%; border-radius: 20px; max-height: 200px; object-fit: cover; }
        .current-hero { background: #1a1a1a; padding: 16px; border-radius: 16px; margin-top: 16px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #00c853; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .imgbb-guide { background: #1a1a1a; padding: 16px; border-radius: 16px; margin-top: 20px; }
        .imgbb-guide p { color: #aaa; font-size: 0.8rem; }
        .loading { text-align: center; padding: 40px; color: #888; }
        
        @media (max-width: 900px) { .two-columns { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<script>
    const isLoggedIn = sessionStorage.getItem('admin_logged_in');
    if (!isLoggedIn) window.location.href = 'verify.html';
    function logout() { sessionStorage.clear(); window.location.href = 'verify.html'; }
</script>

<div class="container">
    <div class="admin-header">
        <div class="logo"><h1>EXODUS</h1><p>ADMIN PANEL</p></div>
        <div class="nav-tabs">
            <a href="admin.html" class="nav-tab">📦 Orders</a>
            <a href="product-manager.html" class="nav-tab active">👕 Products</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="two-columns">
        <!-- Add/Edit Product Form -->
        <div class="form-card">
            <h2 id="formTitle">➕ Add New Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Price (ETB)</label>
                    <input type="number" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="">Select Category</option>
                        <option value="shirts">shirts</option>
                        <option value="mens">Men's</option>
                        <option value="womens">Women's</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product Images (up to 5)</label>
                    <div class="image-inputs" id="imageInputs">
                        <div class="image-row">
                            <input type="url" class="img-url" placeholder="Main image URL (ImgBB)" id="img0">
                            <div class="image-preview" id="preview0"></div>
                        </div>
                        <div class="image-row">
                            <input type="url" class="img-url" placeholder="Image 2 (optional)" id="img1">
                            <div class="image-preview" id="preview1"></div>
                        </div>
                        <div class="image-row">
                            <input type="url" class="img-url" placeholder="Image 3 (optional)" id="img2">
                            <div class="image-preview" id="preview2"></div>
                        </div>
                        <div class="image-row">
                            <input type="url" class="img-url" placeholder="Image 4 (optional)" id="img3">
                            <div class="image-preview" id="preview3"></div>
                        </div>
                        <div class="image-row">
                            <input type="url" class="img-url" placeholder="Image 5 (optional)" id="img4">
                            <div class="image-preview" id="preview4"></div>
                        </div>
                    </div>
                    <div class="imgbb-guide">
                        <p>📸 Upload each photo to <a href="https://imgbb.com" target="_blank" style="color:#00c853;">imgbb.com</a> → Copy "Direct Link" → Paste above</p>
                    </div>
                </div>
                <div class="form-group">
                    <label>Sizes Available</label>
                    <div class="sizes-container" id="sizesContainer">
                        <div class="size-checkbox" data-size="S">S</div>
                        <div class="size-checkbox" data-size="M">M</div>
                        <div class="size-checkbox" data-size="L">L</div>
                        <div class="size-checkbox" data-size="XL">XL</div>
                        <div class="size-checkbox" data-size="XXL">XXL</div>
                        <div class="size-checkbox" data-size="One Size">One Size</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Stock per Size</label>
                    <div id="stockInputs" class="stock-inputs"></div>
                </div>
                <input type="hidden" id="editingId">
                <button type="submit" id="submitBtn">➕ Add Product</button>
                <button type="button" id="cancelEditBtn" class="btn-secondary" style="display:none;">Cancel Edit</button>
            </form>
        </div>

        <!-- Products List -->
        <div class="products-card">
            <h2>📋 Your Products</h2>
            <div id="stockAlert" class="alert-box"></div>
            <div class="products-table">
                <div id="productsLoading" class="loading">Loading products...</div>
                <table id="productsTable" style="display:none;">
                    <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Sizes</th><th>Stock</th><th>Actions</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Hero Image Section -->
    <div style="margin-top: 40px;">
        <div class="hero-card">
            <h2>🖼️ Hero Image (Store Banner)</h2>
            <input type="url" id="heroImageUrl" placeholder="Hero image URL from ImgBB">
            <button id="saveHeroBtn" style="margin-top:10px;">Save Hero Image</button>
            <button id="resetHeroBtn" class="btn-secondary" style="margin-left:10px;">Reset to Default</button>
            <div class="hero-preview"><div class="current-hero"><img id="heroPreview" src=""></div></div>
        </div>
    </div>
</div>
<div class="toast" id="toastMsg">Saved!</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let selectedSizes = ['S','M','L','XL','XXL'];
    let editingProductId = null;

    function showToast(msg) { let t=document.getElementById('toastMsg'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
    
    // Preview images as you type URLs
    function setupImagePreviews() {
        for(let i=0; i<=4; i++) {
            let input = document.getElementById(`img${i}`);
            let previewDiv = document.getElementById(`preview${i}`);
            if(input && previewDiv) {
                input.addEventListener('input', () => {
                    if(input.value) {
                        previewDiv.innerHTML = `<img src="${input.value}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=''">`;
                    } else {
                        previewDiv.innerHTML = '';
                    }
                });
            }
        }
    }
    
    function getImagesArray() {
        let images = [];
        for(let i=0; i<=4; i++) {
            let val = document.getElementById(`img${i}`).value.trim();
            if(val) images.push(val);
        }
        return images;
    }
    
    function setImagesArray(images) {
        for(let i=0; i<=4; i++) {
            let input = document.getElementById(`img${i}`);
            if(input) {
                input.value = images[i] || '';
                let previewDiv = document.getElementById(`preview${i}`);
                if(previewDiv && images[i]) {
                    previewDiv.innerHTML = `<img src="${images[i]}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=''">`;
                } else if(previewDiv) {
                    previewDiv.innerHTML = '';
                }
            }
        }
    }
    
    function renderSizeCheckboxes() {
        let div = document.getElementById('stockInputs');
        div.innerHTML = '';
        selectedSizes.forEach(size => {
            div.innerHTML += `<div class="stock-item"><label>${size}</label><input type="number" id="stock_${size}" value="0" min="0" class="stock-input"></div>`;
        });
    }
    
    document.querySelectorAll('.size-checkbox').forEach(cb => {
        cb.onclick = () => {
            let size = cb.dataset.size;
            if(selectedSizes.includes(size)) {
                selectedSizes = selectedSizes.filter(s => s !== size);
                cb.classList.remove('selected');
            } else {
                selectedSizes.push(size);
                cb.classList.add('selected');
            }
            renderSizeCheckboxes();
        };
        if(['S','M','L','XL','XXL'].includes(cb.dataset.size)) cb.classList.add('selected');
    });
    
    function getStockObject() {
        let stock = {};
        selectedSizes.forEach(size => {
            let inp = document.getElementById(`stock_${size}`);
            stock[size] = inp ? parseInt(inp.value) || 0 : 0;
        });
        return stock;
    }
    
    function checkLowStock(products) {
        let out = products.filter(p => Object.values(p.stock).every(q => q === 0));
        let low = products.filter(p => Object.values(p.stock).some(q => q <= 3 && q > 0));
        let div = document.getElementById('stockAlert');
        if(out.length || low.length) {
            div.style.display = 'block';
            div.innerHTML = (out.length ? `<div class="alert-out"><strong>⚠️ OUT OF STOCK:</strong> ${out.map(p=>p.name).join(', ')}</div>` : '') +
                           (low.length ? `<div class="alert-low"><strong>📦 LOW STOCK (≤3 left):</strong> ${low.map(p=>p.name).join(', ')}</div>` : '');
        } else {
            div.style.display = 'none';
        }
    }
    
    async function loadProducts() {
        let loading = document.getElementById('productsLoading');
        let table = document.getElementById('productsTable');
        try {
            let res = await fetch(`${API_BASE}/products`);
            let products = await res.json();
            loading.style.display = 'none';
            table.style.display = 'table';
            checkLowStock(products);
            let tbody = document.getElementById('productsTableBody');
            if(products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No products yet</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.images?.[0] || ''}" class="product-image" onerror="this.src='https://placehold.co/400x500/333/white?text=No+Image'"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.category || 'uncategorized'}</td>
                    <td>${p.price} ETB</td>
                    <td>${p.sizes.join(', ')}</td>
                    <td>${Object.entries(p.stock).map(([s,q]) => `${s}:${q}`).join(', ')}</td>
                    <td><button class="edit-btn" onclick="editProduct(${p.id})">Edit</button><button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button></td>
                </tr>
            `).join('');
        } catch(e) {
            loading.innerHTML = 'Error loading products';
        }
    }
    
    async function editProduct(id) {
        let res = await fetch(`${API_BASE}/products`);
        let products = await res.json();
        let p = products.find(p => p.id === id);
        if(!p) return;
        editingProductId = id;
        document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
        document.getElementById('submitBtn').innerHTML = '💾 Save Changes';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        document.getElementById('productName').value = p.name;
        document.getElementById('productPrice').value = p.price;
        document.getElementById('productCategory').value = p.category || '';
        setImagesArray(p.images || []);
        document.querySelectorAll('.size-checkbox').forEach(cb => cb.classList.remove('selected'));
        selectedSizes = [...p.sizes];
        document.querySelectorAll('.size-checkbox').forEach(cb => {
            if(selectedSizes.includes(cb.dataset.size)) cb.classList.add('selected');
        });
        renderSizeCheckboxes();
        setTimeout(() => {
            Object.entries(p.stock).forEach(([size, qty]) => {
                let inp = document.getElementById(`stock_${size}`);
                if(inp) inp.value = qty;
            });
        }, 50);
    }
    
    async function deleteProduct(id) {
        if(confirm('Delete this product?')) {
            await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
            showToast('Product deleted');
            loadProducts();
        }
    }
    
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let product = {
            name: document.getElementById('productName').value,
            price: parseInt(document.getElementById('productPrice').value),
            category: document.getElementById('productCategory').value,
            images: getImagesArray(),
            sizes: selectedSizes,
            stock: getStockObject()
        };
        if(editingProductId) {
            await fetch(`${API_BASE}/products/${editingProductId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            showToast('Product updated!');
        } else {
            await fetch(`${API_BASE}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            showToast('Product added!');
        }
        document.getElementById('productForm').reset();
        setImagesArray([]);
        editingProductId = null;
        document.getElementById('formTitle').innerHTML = '➕ Add New Product';
        document.getElementById('submitBtn').innerHTML = '➕ Add Product';
        document.getElementById('cancelEditBtn').style.display = 'none';
        selectedSizes = ['S','M','L','XL','XXL'];
        document.querySelectorAll('.size-checkbox').forEach(cb => {
            if(['S','M','L','XL','XXL'].includes(cb.dataset.size)) cb.classList.add('selected');
            else cb.classList.remove('selected');
        });
        renderSizeCheckboxes();
        loadProducts();
    });
    
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
        editingProductId = null;
        document.getElementById('productForm').reset();
        setImagesArray([]);
        document.getElementById('formTitle').innerHTML = '➕ Add New Product';
        document.getElementById('submitBtn').innerHTML = '➕ Add Product';
        document.getElementById('cancelEditBtn').style.display = 'none';
        selectedSizes = ['S','M','L','XL','XXL'];
        document.querySelectorAll('.size-checkbox').forEach(cb => {
            if(['S','M','L','XL','XXL'].includes(cb.dataset.size)) cb.classList.add('selected');
            else cb.classList.remove('selected');
        });
        renderSizeCheckboxes();
    });
    
    // Hero image functions
    async function loadHero() {
        let res = await fetch(`${API_BASE}/hero-image`);
        let data = await res.json();
        let url = data.url || 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=800&h=1000&fit=crop';
        document.getElementById('heroImageUrl').value = url;
        document.getElementById('heroPreview').src = url;
    }
    async function saveHero() {
        let url = document.getElementById('heroImageUrl').value;
        if(!url) return;
        await fetch(`${API_BASE}/hero-image`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
        showToast('Hero image saved');
        document.getElementById('heroPreview').src = url;
    }
    async function resetHero() {
        let def = 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=800&h=1000&fit=crop';
        await fetch(`${API_BASE}/hero-image`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: def }) });
        document.getElementById('heroImageUrl').value = def;
        document.getElementById('heroPreview').src = def;
        showToast('Reset to default');
    }
    
    document.getElementById('saveHeroBtn').onclick = saveHero;
    document.getElementById('resetHeroBtn').onclick = resetHero;
    
    setupImagePreviews();
    renderSizeCheckboxes();
    loadProducts();
    loadHero();
    
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;
</script>
</body>
</html>
