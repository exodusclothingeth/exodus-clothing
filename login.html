<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo img { height: 70px; width: auto; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 32px; }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background: white;
            color: black;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #ddd; }
        .error {
            background: rgba(255,68,68,0.2);
            color: #ff4444;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 16px;
            font-size: 0.85rem;
            display: none;
        }
        .debug {
            background: rgba(255,255,255,0.1);
            color: #888;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            font-family: monospace;
            display: none;
        }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="images/exodus-logo.png" alt="EXODUS" onerror="this.style.display='none'">
        </div>
        <h1>Admin Access</h1>
        <p class="subtitle">Enter your credentials</p>
        
        <form id="loginForm">
            <input type="text" id="email" placeholder="Email" value="exodusclothingeth@gmail.com">
            <input type="password" id="password" placeholder="Password" value="ExodusAdmin2025">
            <button type="submit">Login →</button>
        </form>
        
        <div id="errorMsg" class="error"></div>
        <div id="debugMsg" class="debug"></div>
        
        <div class="back-link">
            <a href="index.html">← Back to Store</a>
        </div>
    </div>

    <script>
        // CORRECT CREDENTIALS - Copy exactly these values
        const VALID_EMAIL = 'exodusclothingeth@gmail.com';
        const VALID_PASSWORD = 'ExodusAdmin2025';
        
        // Pre-fill the form with the exact credentials for testing
        document.getElementById('email').value = VALID_EMAIL;
        document.getElementById('password').value = VALID_PASSWORD;
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const debugDiv = document.getElementById('debugMsg');
            
            // Hide previous messages
            errorDiv.style.display = 'none';
            debugDiv.style.display = 'none';
            
            // Debug: Show what you entered vs what's expected
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = `
                <strong>Debug Info:</strong><br>
                You entered: "${email}"<br>
                Expected: "${VALID_EMAIL}"<br>
                Email match: ${email === VALID_EMAIL ? '✅ YES' : '❌ NO'}<br>
                Password match: ${password === VALID_PASSWORD ? '✅ YES' : '❌ NO'}
            `;
            
            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_login_time', Date.now());
                window.location.href = 'admin.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Invalid email or password - check debug info above';
            }
        });
    </script>
</body>
</html>
