<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: #111;
            border: 1px solid #222;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo img {
            height: 70px;
            width: auto;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        button {
            width: 100%;
            background: white;
            color: black;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #ddd;
        }
        .error {
            background: rgba(255,68,68,0.2);
            color: #ff4444;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-top: 16px;
            font-size: 0.85rem;
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .back-link a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="images/exodus-logo.png" alt="EXODUS" onerror="this.style.display='none'; this.nextSibling.style.display='block';">
            <span style="display: none; font-size: 1.8rem; font-weight: 800;">EXODUS</span>
        </div>
        <h1>Admin Access</h1>
        <p class="subtitle">Enter your credentials to continue</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="exodus">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Login →</button>
        </form>
        
        <div id="errorMsg" class="error" style="display: none;"></div>
        
        <div class="back-link">
            <a href="index.html">← Back to Store</a>
        </div>
    </div>

    <script>
        // Admin credentials (YOU CAN CHANGE THESE)
        const ADMIN_USERNAME = 'exodus';
        const ADMIN_PASSWORD = 'exodus123';
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                // Store login in sessionStorage (expires when browser closes)
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_login_time', Date.now());
                
                // Redirect to admin dashboard
                window.location.href = 'admin.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Invalid username or password';
            }
        });
    </script>
</body>
</html>
