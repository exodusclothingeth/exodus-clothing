<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EXODUS - Sales Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000000; color: #ffffff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #222; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; }
        .logo p { color: #888; font-size: 0.7rem; letter-spacing: 2px; }
        .back-link { color: #fff; text-decoration: none; border: 1px solid #333; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; }
        .back-link:hover { background: #fff; color: #000; }
        
        /* Date Filter */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        .filter-btn { background: #1a1a1a; border: 1px solid #333; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; color: #fff; }
        .filter-btn.active { background: #fff; color: #000; border-color: #fff; }
        .date-range { display: flex; gap: 10px; align-items: center; margin-left: auto; }
        .date-range input { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 12px; color: white; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-card i { font-size: 2rem; margin-bottom: 12px; }
        .stat-number { font-size: 2rem; font-weight: 800; }
        .stat-label { color: #888; margin-top: 5px; font-size: 0.8rem; }
        
        /* Charts */
        .chart-container { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .chart-title { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; }
        
        /* Products Table */
        .products-table-container { background: #111; border: 1px solid #222; border-radius: 20px; overflow: hidden; }
        .products-table { width: 100%; border-collapse: collapse; }
        .products-table th, .products-table td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        .products-table th { background: #0a0a0a; color: #888; font-weight: 500; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        
        .loading { text-align: center; padding: 60px; color: #888; }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .date-range { margin-left: 0; justify-content: space-between; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<script>
    // Login check
    const isLoggedIn = sessionStorage.getItem('admin_logged_in');
    if (!isLoggedIn) {
        window.location.href = 'verify.html';
    }
</script>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1>EXODUS</h1>
            <p>SALES REPORTS</p>
        </div>
        <a href="admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button class="filter-btn active" data-days="7">Last 7 Days</button>
        <button class="filter-btn" data-days="30">Last 30 Days</button>
        <button class="filter-btn" data-days="90">Last 90 Days</button>
        <button class="filter-btn" data-days="365">Last Year</button>
        <button class="filter-btn" data-days="all">All Time</button>
        <div class="date-range">
            <input type="date" id="startDate">
            <span>to</span>
            <input type="date" id="endDate">
            <button id="applyCustomBtn" style="background:#fff; color:#000; border:none; padding:8px 16px; border-radius:40px; cursor:pointer;">Apply</button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><i class="fas fa-shopping-bag"></i><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><i class="fas fa-money-bill"></i><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Revenue (ETB)</div></div>
        <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-number" id="avgOrderValue">0</div><div class="stat-label">Avg Order Value</div></div>
        <div class="stat-card"><i class="fas fa-truck"></i><div class="stat-number" id="deliveredRate">0%</div><div class="stat-label">Delivery Rate</div></div>
    </div>

    <!-- Best Sellers Chart -->
    <div class="chart-container">
        <div class="chart-title">🏆 Best Selling Products</div>
        <div class="products-table-container">
            <table class="products-table">
                <thead>
                    <tr><th>Rank</th><th>Product</th><th>Units Sold</th><th>Revenue</th></tr>
                </thead>
                <tbody id="bestSellersBody">
                    <tr><td colspan="4" class="loading">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Monthly Sales Chart (Simple Bar Chart) -->
    <div class="chart-container">
        <div class="chart-title">📅 Monthly Sales Trend</div>
        <div id="monthlyChart" style="display: flex; flex-direction: column; gap: 12px;">
            <div class="loading">Loading chart...</div>
        </div>
    </div>

    <!-- Orders by Status -->
    <div class="stats-grid" style="margin-bottom: 0;">
        <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card"><i class="fas fa-truck"></i><div class="stat-number" id="outForDeliveryCount">0</div><div class="stat-label">Out for Delivery</div></div>
        <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-number" id="deliveredCount">0</div><div class="stat-label">Delivered</div></div>
        <div class="stat-card"><i class="fas fa-times-circle"></i><div class="stat-number" id="cancelledCount">0</div><div class="stat-label">Cancelled</div></div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let allOrders = [];
    let currentFilter = { days: 7 };

    async function loadOrders() {
        try {
            const response = await fetch(`${API_BASE}/orders`);
            allOrders = await response.json();
            applyFilter();
        } catch (error) {
            console.error('Error loading orders:', error);
            document.getElementById('bestSellersBody').innerHTML = '<tr><td colspan="4" class="loading">Error loading orders</td></tr>';
        }
    }

    function getDateRange() {
        const now = new Date();
        let startDate;
        
        if (currentFilter.startDate && currentFilter.endDate) {
            return { start: new Date(currentFilter.startDate), end: new Date(currentFilter.endDate) };
        }
        
        if (currentFilter.days === 'all') {
            startDate = new Date(2000, 0, 1);
        } else {
            startDate = new Date();
            startDate.setDate(now.getDate() - currentFilter.days);
        }
        
        return { start: startDate, end: now };
    }

    function filterOrdersByDate(orders) {
        const { start, end } = getDateRange();
        return orders.filter(order => {
            const orderDate = new Date(order.created_at);
            return orderDate >= start && orderDate <= end;
        });
    }

    function calculateStats(filteredOrders) {
        const total = filteredOrders.length;
        const revenue = filteredOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        const avgOrderValue = total > 0 ? revenue / total : 0;
        
        const delivered = filteredOrders.filter(o => o.delivery_status === 'delivered').length;
        const deliveryRate = total > 0 ? (delivered / total) * 100 : 0;
        
        const pending = filteredOrders.filter(o => o.delivery_status === 'pending').length;
        const outForDelivery = filteredOrders.filter(o => o.delivery_status === 'out_for_delivery').length;
        const cancelled = filteredOrders.filter(o => o.status === 'cancelled').length;
        
        document.getElementById('totalOrders').innerText = total;
        document.getElementById('totalRevenue').innerText = revenue.toLocaleString();
        document.getElementById('avgOrderValue').innerText = Math.round(avgOrderValue).toLocaleString();
        document.getElementById('deliveredRate').innerText = Math.round(deliveryRate) + '%';
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('outForDeliveryCount').innerText = outForDelivery;
        document.getElementById('deliveredCount').innerText = delivered;
        document.getElementById('cancelledCount').innerText = cancelled;
        
        return { revenue, total };
    }

    function calculateBestSellers(filteredOrders) {
        const productSales = {};
        
        filteredOrders.forEach(order => {
            (order.items || []).forEach(item => {
                const key = item.name;
                if (!productSales[key]) {
                    productSales[key] = { units: 0, revenue: 0, name: item.name };
                }
                productSales[key].units += item.quantity;
                productSales[key].revenue += item.price * item.quantity;
            });
        });
        
        const sorted = Object.values(productSales).sort((a, b) => b.units - a.units);
        return sorted.slice(0, 10);
    }

    function renderBestSellers(bestSellers) {
        const tbody = document.getElementById('bestSellersBody');
        if (bestSellers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="loading">No sales data available</td></tr>';
            return;
        }
        
        tbody.innerHTML = bestSellers.map((product, index) => {
            let rankClass = '';
            if (index === 0) rankClass = 'rank-1';
            else if (index === 1) rankClass = 'rank-2';
            else if (index === 2) rankClass = 'rank-3';
            
            return `
                <tr>
                    <td class="${rankClass}">${index + 1}</td>
                    <td><strong>${product.name}</strong></td>
                    <td>${product.units} units</td>
                    <td>${product.revenue.toLocaleString()} ETB</td>
                </tr>
            `;
        }).join('');
    }

    function renderMonthlyChart(filteredOrders) {
        const monthlyData = {};
        
        filteredOrders.forEach(order => {
            const date = new Date(order.created_at);
            const monthKey = `${date.getFullYear()}-${date.getMonth() + 1}`;
            const monthName = date.toLocaleString('default', { month: 'short', year: 'numeric' });
            
            if (!monthlyData[monthKey]) {
                monthlyData[monthKey] = { name: monthName, revenue: 0, orders: 0 };
            }
            monthlyData[monthKey].revenue += order.total || 0;
            monthlyData[monthKey].orders += 1;
        });
        
        const sorted = Object.values(monthlyData).reverse().slice(0, 12);
        const chartDiv = document.getElementById('monthlyChart');
        
        if (sorted.length === 0) {
            chartDiv.innerHTML = '<div class="loading">No data to display</div>';
            return;
        }
        
        const maxRevenue = Math.max(...sorted.map(m => m.revenue), 1);
        
        chartDiv.innerHTML = sorted.map(month => {
            const barHeight = (month.revenue / maxRevenue) * 100;
            return `
                <div style="margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem;">
                        <span>${month.name}</span>
                        <span>${month.revenue.toLocaleString()} ETB (${month.orders} orders)</span>
                    </div>
                    <div style="background: #1a1a1a; border-radius: 20px; overflow: hidden;">
                        <div style="background: #fff; width: ${barHeight}%; height: 30px; border-radius: 20px; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; color: #000; font-weight: bold; font-size: 0.8rem;">
                            ${barHeight > 15 ? Math.round(month.revenue / 1000) + 'k' : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function applyFilter() {
        const filtered = filterOrdersByDate(allOrders);
        const stats = calculateStats(filtered);
        const bestSellers = calculateBestSellers(filtered);
        renderBestSellers(bestSellers);
        renderMonthlyChart(filtered);
    }

    // Event Listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const days = parseInt(btn.dataset.days);
            currentFilter = { days: isNaN(days) ? btn.dataset.days : days };
            delete currentFilter.startDate;
            delete currentFilter.endDate;
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            applyFilter();
        });
    });

    document.getElementById('applyCustomBtn').addEventListener('click', () => {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (startDate && endDate) {
            currentFilter = { startDate, endDate };
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            applyFilter();
        }
    });

    loadOrders();
</script>
</body>
</html>
